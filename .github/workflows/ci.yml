name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint with ruff
        run: ruff check claude_browse tests

      - name: Run pytest
        run: pytest -v

      - name: Smoke-test entry points
        run: |
          claude-browse --help
          claude-resume --help || true  # exits 1 when no args, that's fine

  shim-smoke:
    name: Direct-script shim works (no pip install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run shims directly
        run: |
          chmod +x ./claude-browse ./claude-resume
          ./claude-browse --help
          ./claude-resume --help || true

      - name: install.sh dry-run check
        run: bash -n install.sh
